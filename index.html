<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuardMe Email Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f1f5f9;
        }

        .preview-container {
            zoom: 0.8;
            transform-origin: top center;
            transition: all 0.3s ease;
            background-color: #ffffff;
            border-radius: 1rem;
        }

        .preview-dark-mode {
            background-color: #0f172a !important;
        }

        #richEditor {
            min-height: 450px;
            outline: none;
        }

        #richEditor p {
            margin-bottom: 1rem;
        }

        @media (max-width: 640px) {
            .preview-container {
                zoom: 0.6;
            }
        }

        .toolbar-btn {
            padding: 0.5rem;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            border: 1px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            background: transparent;
        }

        .toolbar-btn:hover {
            background-color: #f1f5f9;
        }

        .toolbar-btn.active {
            background-color: #e0f2fe;
            color: #0369a1;
            border-color: #bae6fd;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-sky-950 flex items-center gap-3">
                    <span class="bg-sky-700 text-white p-2 rounded-lg shadow-lg shadow-sky-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                        </svg>
                    </span>
                    GeoGuardMe Generator
                </h1>
                <p class="text-slate-500 mt-1">Design and copy branded GeoGuardMe communications.</p>
            </div>
            <div class="flex gap-3">
                <button id="copyBtn" onclick="copyToClipboard()"
                    class="bg-sky-700 hover:bg-sky-800 text-white px-6 py-3 rounded-xl font-semibold shadow-lg shadow-sky-200 transition-all flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                    </svg>
                    Copy for Email
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                    <div class="bg-slate-50 border-b border-slate-200 p-2 flex items-center gap-1">
                        <button id="btn-bold" onclick="format('bold')" class="toolbar-btn" title="Bold">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                            </svg>
                        </button>
                        <button id="btn-italic" onclick="format('italic')" class="toolbar-btn" title="Italic">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="19" y1="4" x2="10" y2="4" />
                                <line x1="14" y1="20" x2="5" y2="20" />
                                <line x1="15" y1="4" x2="9" y2="20" />
                            </svg>
                        </button>
                        <div class="w-px h-6 bg-slate-300 mx-1"></div>
                        <button id="btn-h2" onclick="format('formatBlock', 'h2')"
                            class="toolbar-btn px-3 font-bold text-sm" title="Large Text">Large</button>
                        <button id="btn-p" onclick="format('formatBlock', 'p')" class="toolbar-btn px-3 text-sm"
                            title="Normal Text">Normal</button>
                    </div>
                    <div id="richEditor" contenteditable="true"
                        class="w-full p-6 text-slate-800 outline-none overflow-y-auto leading-relaxed"></div>
                </div>
            </div>

            <div class="bg-slate-300/50 rounded-2xl p-4 border border-slate-300 relative min-h-[700px] flex flex-col">
                <div class="absolute top-4 left-4 z-10 flex gap-2">
                    <div
                        class="bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-sky-900 uppercase tracking-widest shadow-sm border border-sky-100">
                        Live Preview</div>
                    <button id="darkModeToggle" onclick="toggleDarkMode()"
                        class="bg-slate-800 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest shadow-sm hover:bg-slate-700 transition-all">View
                        in Dark Mode</button>
                </div>
                <div id="previewContainer"
                    class="flex-grow h-full overflow-y-auto preview-container py-8 text-center mt-8">
                    <iframe id="previewFrame" class="mx-auto" frameborder="0" scrolling="no"
                        style="width: 100%; border: none; min-height: 650px;"></iframe>
                </div>
            </div>
        </div>

        <div id="toast"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-sky-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 translate-y-4 pointer-events-none transition-all duration-300 flex items-center gap-3 border border-sky-700">
            <div class="bg-sky-500 rounded-full p-1"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M20 6 9 17l-5-5" />
                </svg></div>
            <span class="font-bold">Template Copied & Ready to Paste!</span>
        </div>
    </div>

    <script>
        const editorEl = document.getElementById('richEditor');
        const previewEl = document.getElementById('previewFrame');
        const previewContainer = document.getElementById('previewContainer');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const toastEl = document.getElementById('toast');

        const BRAND = {
            name: "GeoGuardMe",
            logo: "https://storage.googleapis.com/travelhawk-email-screenshots/GeoGuardMe/1_trim.png",
            primaryColor: "#0c4a6e",
            accentColor: "#0ea5e9",
            footerBg: "#f8fafc",
            website: "app.geoguardme.com",
            tagline: "Your Trusted Safety Companion"
        };

        const defaultContent = `<p>Hi Team,</p><p>I am pleased to confirm that the <b>GeoGuardMe security protocols</b> for your project have been successfully initialized.</p><p>Our team has completed the primary geofencing configuration and the real-time monitoring dashboard is now live.</p><h2>Immediate Next Steps:</h2><p>1. Log in to the GeoGuardMe portal.<br>2. Verify your active monitoring zones.<br>3. Confirm the emergency contact escalation list.</p><p>Stay secure,</p><p><strong>The GeoGuardMe Team</strong></p>`;
        editorEl.innerHTML = defaultContent;

        function toggleDarkMode() {
            const isDark = previewContainer.classList.toggle('preview-dark-mode');
            darkModeToggle.textContent = isDark ? "View in Light Mode" : "View in Dark Mode";
            updatePreview();
        }

        function updateToolbarState() {
            document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
            document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let node = selection.getRangeAt(0).startContainer;
                if (node.nodeType === 3) node = node.parentNode;
                let isH2 = false, isP = false;
                while (node && node !== editorEl) {
                    if (node.tagName === 'H2') { isH2 = true; break; }
                    if (node.tagName === 'P') { isP = true; break; }
                    node = node.parentNode;
                }
                document.getElementById('btn-h2').classList.toggle('active', isH2);
                document.getElementById('btn-p').classList.toggle('active', isP || (!isH2 && node === editorEl));
            }
        }

        function format(command, value = null) {
            document.execCommand(command, false, value);
            editorEl.focus();
            updateToolbarState();
            updatePreview();
        }

        function generateEmailHtml(innerHtml, isFinalCopy = false) {
            const isDarkView = previewContainer.classList.contains('preview-dark-mode');

            // Light Mode is Pure White
            // Dark Mode is Slate
            const bgColor = isDarkView ? '#0f172a' : '#ffffff';
            const cardColor = isDarkView ? '#1e293b' : '#ffffff';
            const textColor = isDarkView ? '#f8fafc' : '#334155';
            const borderColor = isDarkView ? '#334155' : '#e2e8f0';
            const h2Color = isDarkView ? BRAND.accentColor : BRAND.primaryColor;

            let styledContent = innerHtml
                .replace(/<h2/gi, `<h2 style="font-size: 22px; color: ${h2Color} !important; margin-bottom: 15px; margin-top: 25px; font-weight: bold; font-family: sans-serif;"`)
                .replace(/<p/gi, `<p style="font-size: 16px; margin-bottom: 20px; color: ${textColor} !important; line-height: 1.7; font-family: sans-serif;"`);

            return `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* This media query only runs in the final sent email, not the preview */
        ${isFinalCopy ? `
        @media (prefers-color-scheme: dark) {
            .body-bg { background-color: #0f172a !important; }
            .card { background-color: #1e293b !important; border-color: #334155 !important; }
            .content-text, .content-text p, .content-text div, .content-text span { color: #f8fafc !important; }
            /* THE SAMSUNG PROTECTION */
            .logo-protect { 
                background-color: #fffffe !important; 
                background-image: linear-gradient(#fffffe, #fffffe) !important; 
                filter: none !important; 
                -webkit-filter: none !important;
            }
        }
        ` : ''}
    </style>
</head>
<body class="body-bg" style="margin: 0; padding: 0; background-color: ${bgColor}; font-family: 'Segoe UI', Arial, sans-serif;">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td style="padding: 30px 0;" align="center">
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" class="card" style="background-color: ${cardColor}; border-radius: 16px; overflow: hidden; border: 1px solid ${borderColor}; margin: 0 auto;">
                    <tr>
                        <td style="background-color: ${BRAND.primaryColor}; padding: 45px 30px; text-align: center;">
                            <!-- White Pill Container with Samsung-Safe Off-White #fffffe -->
                            <div class="logo-protect" style="background-color: #fffffe; background-image: linear-gradient(#fffffe, #fffffe); border-radius: 20px; padding: 18px 25px; display: inline-block; border: 3px solid ${BRAND.accentColor};">
                                <img src="${BRAND.logo}" alt="${BRAND.name}" width="280" style="display: block; border: 0; max-width: 280px; height: auto; margin: 0 auto;">
                            </div>
                            <p style="margin: 25px 0 0 0; color: #ffffff !important; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-family: 'Segoe UI', Arial, sans-serif;">${BRAND.tagline}</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="content-text" style="padding: 40px; font-family: 'Segoe UI', Arial, sans-serif; color: ${textColor} !important; text-align: left;">
                            <div style="color: ${textColor} !important;">
                                ${styledContent}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: ${isDarkView ? '#0f172a' : BRAND.footerBg}; padding: 30px; text-align: center; border-top: 1px solid ${borderColor}; font-size: 12px; color: #94a3b8; font-family: 'Segoe UI', Arial, sans-serif;">
                            <p style="margin: 0 0 10px 0; font-weight: 600; color: #64748b;">&copy; 2026 GeoGuardMe Security Solutions.</p>
                            <p style="margin: 0;"><a href="https://${BRAND.website}" style="color: ${BRAND.accentColor}; text-decoration: none; font-weight: 700;">${BRAND.website}</a></p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>`;
        }

        function updatePreview() {
            previewEl.srcdoc = generateEmailHtml(editorEl.innerHTML, false);
            previewEl.onload = () => { try { previewEl.style.height = (previewEl.contentDocument.body.scrollHeight + 20) + 'px'; } catch (e) { } };
        }

        async function copyToClipboard() {
            const html = generateEmailHtml(editorEl.innerHTML, true);

            try {
                const blob = new Blob([html], { type: 'text/html' });
                await navigator.clipboard.write([new ClipboardItem({ 'text/html': blob })]);
                toastEl.classList.remove('opacity-0', 'translate-y-4');
                toastEl.classList.add('opacity-100', 'translate-y-0');
                setTimeout(() => { toastEl.classList.add('opacity-0', 'translate-y-4'); toastEl.classList.remove('opacity-100', 'translate-y-0'); }, 3000);
            } catch (err) {
                const tempDiv = document.createElement('div'); tempDiv.style.position = 'fixed'; tempDiv.style.left = '-9999px'; tempDiv.innerHTML = html;
                document.body.appendChild(tempDiv);
                const range = document.createRange(); range.selectNode(tempDiv);
                window.getSelection().removeAllRanges(); window.getSelection().addRange(range);
                document.execCommand('copy'); document.body.removeChild(tempDiv);
                toastEl.classList.remove('opacity-0'); setTimeout(() => toastEl.classList.add('opacity-0'), 3000);
            }
        }

        editorEl.addEventListener('input', () => { updatePreview(); updateToolbarState(); });
        ['keyup', 'mousedown', 'mouseup', 'click'].forEach(evt => editorEl.addEventListener(evt, () => setTimeout(updateToolbarState, 20)));
        window.onload = () => { updatePreview(); updateToolbarState(); };
    </script>
</body>

</html>
