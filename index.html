<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuardMe Email Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f1f5f9;
        }

        .preview-container {
            zoom: 0.8;
            transform-origin: top center;
        }

        /* Styling for the Rich Text Editor */
        #richEditor {
            min-height: 450px;
            outline: none;
        }

        #richEditor p {
            margin-bottom: 1rem;
        }

        @media (max-width: 640px) {
            .preview-container {
                zoom: 0.6;
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .toolbar-btn {
            padding: 0.5rem;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            border: 1px solid transparent;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
            cursor: pointer;
            background: transparent;
        }

        .toolbar-btn:hover {
            background-color: #f1f5f9;
        }

        .toolbar-btn.active {
            background-color: #e0f2fe;
            color: #0369a1;
            border-color: #bae6fd;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-sky-950 flex items-center gap-3">
                    <span class="bg-sky-700 text-white p-2 rounded-lg shadow-lg shadow-sky-200">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                        </svg>
                    </span>
                    GeoGuardMe Generator
                </h1>
                <p class="text-slate-500 mt-1">Design and copy branded GeoGuardMe communications.</p>
            </div>
            <div class="flex gap-3">
                <button id="copyBtn" onclick="copyToClipboard()"
                    class="bg-sky-700 hover:bg-sky-800 text-white px-6 py-3 rounded-xl font-semibold shadow-lg shadow-sky-200 transition-all flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                    </svg>
                    Copy for Email
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left: Input Area -->
            <div class="space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                    <!-- Toolbar -->
                    <div class="bg-slate-50 border-b border-slate-200 p-2 flex items-center gap-1">
                        <button id="btn-bold" onclick="format('bold')" class="toolbar-btn" title="Bold">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                                <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                            </svg>
                        </button>
                        <button id="btn-italic" onclick="format('italic')" class="toolbar-btn" title="Italic">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="19" y1="4" x2="10" y2="4" />
                                <line x1="14" y1="20" x2="5" y2="20" />
                                <line x1="15" y1="4" x2="9" y2="20" />
                            </svg>
                        </button>
                        <div class="w-px h-6 bg-slate-300 mx-1"></div>
                        <button id="btn-h2" onclick="format('formatBlock', 'h2')"
                            class="toolbar-btn px-3 font-bold text-sm" title="Large Text">
                            Large
                        </button>
                        <button id="btn-p" onclick="format('formatBlock', 'p')" class="toolbar-btn px-3 text-sm"
                            title="Normal Text">
                            Normal
                        </button>
                    </div>

                    <!-- Editable Content -->
                    <div id="richEditor" contenteditable="true"
                        class="w-full p-6 text-slate-800 outline-none overflow-y-auto leading-relaxed"></div>
                </div>
                <div class="flex items-center gap-2 text-xs text-slate-400 px-2 italic">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                    Highlight text or place cursor to see active formatting.
                </div>
            </div>

            <!-- Right: Preview Area -->
            <div class="bg-slate-300/50 rounded-2xl p-4 overflow-hidden border border-slate-300 relative">
                <div
                    class="absolute top-4 left-4 z-10 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold text-sky-900 uppercase tracking-widest shadow-sm border border-sky-100">
                    Live Brand Preview
                </div>
                <div class="h-full overflow-y-auto preview-container py-8">
                    <div id="previewFrame" class="shadow-2xl">
                        <!-- Email HTML will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Toast -->
        <div id="toast"
            class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-sky-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 translate-y-4 pointer-events-none transition-all duration-300 flex items-center gap-3 border border-sky-700">
            <div class="bg-sky-500 rounded-full p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6 9 17l-5-5" />
                </svg>
            </div>
            <span class="font-bold">Template Copied & Ready to Paste!</span>
        </div>
    </div>

    <script>
        const editorEl = document.getElementById('richEditor');
        const previewEl = document.getElementById('previewFrame');
        const toastEl = document.getElementById('toast');

        const BRAND = {
            name: "GeoGuardMe",
            logo: "https://storage.googleapis.com/travelhawk-email-screenshots/GeoGuardMe/1_trim.png",
            logoDark: "https://storage.googleapis.com/travelhawk-email-screenshots/GeoGuardMe/1_footer.png",
            primaryColor: "#0c4a6e",
            accentColor: "#0ea5e9",
            footerBg: "#f8fafc",
            website: "app.geoguardme.com",
            tagline: "Your Trusted Safety Companion"
        };

        const defaultContent = `<p>Hi Team,</p>
<p>I am pleased to confirm that the <b>GeoGuardMe security protocols</b> for your project have been successfully initialized.</p>
<p>Our team has completed the primary geofencing configuration and the real-time monitoring dashboard is now live.</p>
<h2>Immediate Next Steps:</h2>
<p>1. Log in to the GeoGuardMe portal.<br>
2. Verify your active monitoring zones.<br>
3. Confirm the emergency contact escalation list.</p>
<p>Stay secure,</p>
<p><strong>The GeoGuardMe Team</strong></p>`;

        editorEl.innerHTML = defaultContent;

        // Visual Feedback Logic
        function updateToolbarState() {
            // 1. Check Bold/Italic via CommandState
            document.getElementById('btn-bold').classList.toggle('active', document.queryCommandState('bold'));
            document.getElementById('btn-italic').classList.toggle('active', document.queryCommandState('italic'));

            // 2. Check Block Format via standard DOM inspection (more reliable than queryCommandValue)
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let parent = selection.getRangeAt(0).startContainer;
                if (parent.nodeType === 3) parent = parent.parentNode; // Text node to element

                // Walk up until we find H2 or P or reach the editor boundary
                let isH2 = false;
                let isP = false;
                let node = parent;

                while (node && node !== editorEl) {
                    if (node.tagName === 'H2') { isH2 = true; break; }
                    if (node.tagName === 'P') { isP = true; break; }
                    node = node.parentNode;
                }

                document.getElementById('btn-h2').classList.toggle('active', isH2);
                document.getElementById('btn-p').classList.toggle('active', isP || (!isH2 && node === editorEl));
            }
        }

        // Rich Text Formatting Function
        function format(command, value = null) {
            document.execCommand(command, false, value);
            editorEl.focus();
            updateToolbarState();
            updatePreview();
        }

        function generateEmailHtml(innerHtml) {
            // Replace tags with email-safe inline styles
            let styledContent = innerHtml
                .replace(/<h2>/g, `<h2 style="font-size: 22px; color: ${BRAND.primaryColor}; margin-bottom: 15px; margin-top: 25px; font-weight: bold; font-family: sans-serif;">`)
                .replace(/<p>/g, `<p style="font-size: 16px; margin-bottom: 20px; color: #334155; line-height: 1.7; font-family: sans-serif;">`)
                .replace(/<\/h2>/g, `</h2>`)
                .replace(/<\/p>/g, `</p>`);

            return `
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <style>
        /* Light mode logo shown by default, dark mode logo hidden */
        .logo-light { display: block !important; max-width: 240px; height: auto; margin: 0 auto; border: 0; }
        .logo-dark  { display: none  !important; max-width: 240px; height: auto; margin: 0 auto; border: 0; }
        /* Logo wrapper: white pill in light mode */
        .logo-wrapper {
            background-color: #ffffff !important;
            border-radius: 20px;
            padding: 15px;
            display: inline-block;
            border: 3px solid ${BRAND.accentColor};
        }
        @media (prefers-color-scheme: dark) {
            /* Swap logos */
            .logo-light { display: none  !important; }
            .logo-dark  { display: block !important; }
            /* Remove white box — dark logo stands alone on the header bg */
            .logo-wrapper {
                background-color: transparent !important;
                border-color: transparent !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f1f5f9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td style="padding: 30px 0;" align="center">
                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; margin: 0 auto;">
                    <tr>
                        <td style="background-color: ${BRAND.primaryColor}; padding: 40px; text-align: center;">
                            <div class="logo-wrapper" style="background-color: #ffffff !important; border-radius: 20px; padding: 15px; display: inline-block; border: 3px solid ${BRAND.accentColor}; mso-padding-alt: 0px;">
                                <!-- Light mode logo -->
                                <img class="logo-light" src="${BRAND.logo}" alt="${BRAND.name} Logo" style="display: block; border: 0; max-width: 240px; height: auto; margin: 0 auto;">
                                <!-- Dark mode logo -->
                                <img class="logo-dark" src="${BRAND.logoDark}" alt="${BRAND.name} Logo" style="display: none; border: 0; max-width: 240px; height: auto; margin: 0 auto;">
                            </div>
                            <p style="margin: 15px 0 0 0; color: ${BRAND.accentColor}; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; font-family: sans-serif;">${BRAND.tagline}</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 40px; background-color: #ffffff; font-family: sans-serif;">
                            ${styledContent}
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: ${BRAND.footerBg}; padding: 30px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="margin: 0 0 10px 0; font-size: 13px; color: #64748b; font-weight: 600; font-family: sans-serif;">&copy; 2026 GeoGuardMe Security Solutions.</p>
                            <p style="margin: 0; font-size: 12px; color: #94a3b8; font-family: sans-serif;">
                                <a href="https://${BRAND.website}" style="color: ${BRAND.accentColor}; text-decoration: none; font-weight: 700;">${BRAND.website}</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>`;
        }

        function updatePreview() {
            previewEl.innerHTML = generateEmailHtml(editorEl.innerHTML);
        }

        async function copyToClipboard() {
            const html = generateEmailHtml(editorEl.innerHTML);

            try {
                const blob = new Blob([html], { type: 'text/html' });
                const data = [new ClipboardItem({ 'text/html': blob })];
                await navigator.clipboard.write(data);

                toastEl.classList.remove('opacity-0', 'translate-y-4');
                toastEl.classList.add('opacity-100', 'translate-y-0');

                setTimeout(() => {
                    toastEl.classList.add('opacity-0', 'translate-y-4');
                    toastEl.classList.remove('opacity-100', 'translate-y-0');
                }, 3000);
            } catch (err) {
                console.error('Clipboard error:', err);
                const tempDiv = document.createElement('div');
                tempDiv.style.position = 'fixed';
                tempDiv.style.left = '-9999px';
                tempDiv.innerHTML = html;
                document.body.appendChild(tempDiv);
                const range = document.createRange();
                range.selectNode(tempDiv);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                document.body.removeChild(tempDiv);
                toastEl.classList.remove('opacity-0');
                setTimeout(() => toastEl.classList.add('opacity-0'), 3000);
            }
        }

        // Listeners for UI state updates
        editorEl.addEventListener('input', () => {
            updatePreview();
            updateToolbarState();
        });

        // Update button highlighting when user clicks or moves cursor
        ['keyup', 'mousedown', 'mouseup', 'click'].forEach(evt => {
            editorEl.addEventListener(evt, () => {
                // Short timeout to ensure selection/caret position is updated in DOM
                setTimeout(updateToolbarState, 20);
            });
        });

        window.onload = () => {
            updatePreview();
            updateToolbarState();
        };
    </script>
</body>

</html>
